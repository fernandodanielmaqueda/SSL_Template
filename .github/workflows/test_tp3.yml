name: Test TP 3

on:
  pull_request:
    branches:
      - main
    paths:
      - 'TP3/**'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: List directory structure
      run: ls -R

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential flex libfl-dev bison libbison-dev

    - name: Display installed versions
      run: |
        git --version
        make --version
        gcc --version
        flex --version
        bison --version

    - name: Compile code with make
      working-directory: ./TP3
      run: |
        make

    - name: Run test script
      working-directory: ./TP3
      run: |
        chmod +x ./tests/run_testsuite.sh
        ./tests/run_testsuite.sh './bin/tp3'

    - name: Clean up
      working-directory: ./TP3
      run: rm -f ./bin/tp3 ./tests/output/test_*.txt ./tests/output/expected/test_*_clean.txt

  llm-review:
    name: Revisión LLM
    needs: test
    if: success() && github.event_name == 'pull_request'
    uses: ./.github/workflows/llm_review.yml
    with:
      tp_dir:      "TP3"
      rubric_file: ".github/rubrics/tp3_rubric.md"
      pr_number:   ${{ github.event.pull_request.number }}
      base_sha:    ${{ github.event.pull_request.base.sha }}
      head_sha:    ${{ github.event.pull_request.head.sha }}
    secrets:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
