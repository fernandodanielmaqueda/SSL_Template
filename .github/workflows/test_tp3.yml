name: Test TP 3

on:
  pull_request:
    branches:
      - main
    paths:
      - 'TP3/**'
  workflow_dispatch:

jobs:
  quality:
    name: Calidad de código (informativo)
    runs-on: ubuntu-latest
    continue-on-error: true

    permissions:
      pull-requests: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Instalar herramientas de calidad
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y clang-format cppcheck

    - name: Verificar formato (clang-format)
      continue-on-error: true
      run: |
        echo "## Verificación de formato (clang-format)" > quality-report.md
        echo "" >> quality-report.md
        FILES=$(find ./TP3 -name '*.c' -o -name '*.h' | grep -v '/bin/' | grep -v 'lex\.yy' | grep -v '\.tab\.' | sort)
        if [ -z "$FILES" ]; then
          echo "*(No se encontraron archivos .c/.h)*" >> quality-report.md
        else
          ISSUES=$(echo "$FILES" | xargs clang-format --dry-run -Werror 2>&1 || true)
          if [ -z "$ISSUES" ]; then
            echo "✅ Todos los archivos cumplen el formato." >> quality-report.md
          else
            echo "⚠️ Archivos con desvíos de formato:" >> quality-report.md
            echo "" >> quality-report.md
            echo '```' >> quality-report.md
            echo "$ISSUES" | head -100 >> quality-report.md
            echo '```' >> quality-report.md
          fi
        fi

    - name: Análisis estático (cppcheck)
      continue-on-error: true
      run: |
        echo "" >> quality-report.md
        echo "## Análisis estático (cppcheck)" >> quality-report.md
        echo "" >> quality-report.md
        RESULT=$(cppcheck --enable=warning,style,performance \
          --suppress=missingIncludeSystem \
          --template='{file}:{line}: [{severity}] {message} ({id})' \
          ./TP3 2>&1 | grep -v '^$' | head -100 || true)
        if [ -z "$RESULT" ]; then
          echo "✅ Sin advertencias de cppcheck." >> quality-report.md
        else
          echo '```' >> quality-report.md
          echo "$RESULT" >> quality-report.md
          echo '```' >> quality-report.md
        fi

    - name: Subir reporte de calidad
      uses: actions/upload-artifact@v4
      with:
        name: quality-report-TP3
        path: quality-report.md
        retention-days: 7

    - name: Publicar reporte en el PR
      if: github.event_name == 'pull_request'
      continue-on-error: true
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        {
          echo "## 📋 Reporte de Calidad — TP3"
          echo ""
          echo "<details>"
          echo "<summary>Ver detalles (clang-format + cppcheck)</summary>"
          echo ""
          cat quality-report.md
          echo ""
          echo "</details>"
          echo ""
          echo "---"
          echo "*Reporte informativo — no bloquea el PR.*"
        } > pr-quality-comment.md
        gh pr comment "${{ github.event.pull_request.number }}" \
          --repo "${{ github.repository }}" \
          --body-file pr-quality-comment.md

  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: List directory structure
      run: ls -R

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential flex libfl-dev bison libbison-dev

    - name: Display installed versions
      run: |
        git --version
        make --version
        gcc --version
        flex --version
        bison --version

    - name: Compile code with make
      working-directory: ./TP3
      run: |
        make

    - name: Run test script
      working-directory: ./TP3
      run: |
        chmod +x ./tests/run_testsuite.sh
        ./tests/run_testsuite.sh './bin/tp3'

    - name: Clean up
      working-directory: ./TP3
      run: rm -f ./bin/tp3 ./tests/output/test_*.txt ./tests/output/expected/test_*_clean.txt

  llm-review:
    name: Revisión LLM
    needs: [test, quality]
    if: needs.test.result == 'success' && github.event_name == 'pull_request'
    uses: ./.github/workflows/llm_review.yml
    with:
      tp_dir:           "TP3"
      rubric_file:      ".github/rubrics/tp3_rubric.md"
      pr_number:        ${{ github.event.pull_request.number }}
      base_sha:         ${{ github.event.pull_request.base.sha }}
      head_sha:         ${{ github.event.pull_request.head.sha }}
      quality_artifact: "quality-report-TP3"
    secrets:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
