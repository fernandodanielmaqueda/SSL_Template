name: Test TP 4

on:
  pull_request:
    branches:
      - main
    paths:
      - 'TP4/**'
  workflow_dispatch:

jobs:
  quality:
    name: Calidad de código (informativo)
    runs-on: ubuntu-latest
    continue-on-error: true

    permissions:
      contents: read
      pull-requests: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Instalar herramientas de calidad
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y clang-format cppcheck

    - name: Verificar formato (clang-format)
      continue-on-error: true
      run: |
        echo "## Verificación de formato (clang-format)" > quality-report.md
        echo "" >> quality-report.md
        FILES=$(find ./TP4 -name '*.c' -o -name '*.h' | grep -v '/bin/' | grep -v 'lex\.yy' | grep -v '\.tab\.' | sort)
        if [ -z "$FILES" ]; then
          echo "*(No se encontraron archivos .c/.h)*" >> quality-report.md
        else
          ISSUES=$(echo "$FILES" | xargs clang-format --dry-run -Werror 2>&1 || true)
          if [ -z "$ISSUES" ]; then
            echo "✅ Todos los archivos cumplen el formato." >> quality-report.md
          else
            echo "⚠️ Archivos con desvíos de formato:" >> quality-report.md
            echo "" >> quality-report.md
            echo '```' >> quality-report.md
            echo "$ISSUES" | head -100 >> quality-report.md
            echo '```' >> quality-report.md
          fi
        fi

    - name: Análisis estático (cppcheck)
      continue-on-error: true
      run: |
        echo "" >> quality-report.md
        echo "## Análisis estático (cppcheck)" >> quality-report.md
        echo "" >> quality-report.md
        RESULT=$(cppcheck --enable=warning,style,performance \
          --suppress=missingIncludeSystem \
          --template='{file}:{line}: [{severity}] {message} ({id})' \
          ./TP4 2>&1 | grep -v '^$' | head -100 || true)
        if [ -z "$RESULT" ]; then
          echo "✅ Sin advertencias de cppcheck." >> quality-report.md
        else
          echo '```' >> quality-report.md
          echo "$RESULT" >> quality-report.md
          echo '```' >> quality-report.md
        fi

    - name: Subir reporte de calidad
      uses: actions/upload-artifact@v4
      with:
        name: quality-report-TP4
        path: quality-report.md
        retention-days: 7

    - name: Publicar reporte en el PR
      if: github.event_name == 'pull_request'
      continue-on-error: true
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        MARKER="<!-- ssl-quality-report -->"
        {
          echo "## 📋 Reporte de Calidad — TP4"
          echo ""
          echo "<details>"
          echo "<summary>Ver detalles (clang-format + cppcheck)</summary>"
          echo ""
          cat quality-report.md
          echo ""
          echo "</details>"
          echo ""
          echo "---"
          echo "*Reporte informativo — no bloquea el PR.*"
          echo ""
          echo "$MARKER"
        } > pr-quality-comment.md

        EXISTING_ID=$(gh api \
          "repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments" \
          --jq ".[] | select(.body | contains(\"$MARKER\")) | .id" | head -1)

        if [ -n "$EXISTING_ID" ]; then
          echo "Actualizando comentario existente #$EXISTING_ID..."
          gh api --method PATCH \
            "repos/${{ github.repository }}/issues/comments/$EXISTING_ID" \
            -f body="$(cat pr-quality-comment.md)"
        else
          echo "Creando nuevo comentario..."
          gh pr comment "${{ github.event.pull_request.number }}" \
            --repo "${{ github.repository }}" \
            --body-file pr-quality-comment.md
        fi

  test:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential flex libfl-dev bison libbison-dev

    - name: Compile code with make
      id: compile
      working-directory: ./TP4
      run: |
        make 2>&1 | tee /tmp/compile-output.txt
        exit ${PIPESTATUS[0]}

    - name: Run test script
      id: run_tests
      working-directory: ./TP4
      run: |
        chmod +x ./tests/run_testsuite.sh
        ./tests/run_testsuite.sh './bin/tp4' 2>&1 | tee /tmp/test-output.txt
        exit ${PIPESTATUS[0]}

    - name: Clean up
      working-directory: ./TP4
      run: rm -f ./bin/tp4 ./tests/output/test_*.txt ./tests/output/expected/test_*_clean.txt

    - name: Comentar error en el PR
      if: failure() && github.event_name == 'pull_request'
      continue-on-error: true
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        MARKER="<!-- ssl-test-failure -->"

        if [ "${{ steps.compile.outcome }}" = "failure" ]; then
          STAGE="compilación"
          OUTPUT=$(cat /tmp/compile-output.txt 2>/dev/null | tail -60 || echo "(sin output)")
          HINT="Revisá los errores del compilador y asegurate de que el \`Makefile\` esté correcto."
        else
          STAGE="tests"
          OUTPUT=$(cat /tmp/test-output.txt 2>/dev/null | tail -60 || echo "(sin output)")
          HINT="Revisá los casos de prueba que fallaron y compará la salida esperada con la obtenida."
        fi

        {
          echo "## ❌ Falló en $STAGE — TP4"
          echo ""
          echo "> Corregí los errores y pusheá nuevamente para volver a correr los checks."
          echo ""
          echo "### Output"
          echo '```'
          echo "$OUTPUT"
          echo '```'
          echo ""
          echo "> 💡 $HINT"
          echo ""
          echo "---"
          echo "*Ver logs completos en [Actions](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})*"
          echo ""
          echo "$MARKER"
        } > pr-failure-comment.md

        EXISTING_ID=$(gh api \
          "repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments" \
          --jq ".[] | select(.body | contains(\"$MARKER\")) | .id" | head -1)

        if [ -n "$EXISTING_ID" ]; then
          gh api --method PATCH \
            "repos/${{ github.repository }}/issues/comments/$EXISTING_ID" \
            -f body="$(cat pr-failure-comment.md)"
        else
          gh pr comment "${{ github.event.pull_request.number }}" \
            --repo "${{ github.repository }}" \
            --body-file pr-failure-comment.md
        fi

  llm-review:
    name: Revisión LLM
    needs: [test, quality]
    if: needs.test.result == 'success' && github.event_name == 'pull_request'
    uses: ./.github/workflows/llm_review.yml
    with:
      tp_dir:           "TP4"
      rubric_file:      ".github/rubrics/tp4_rubric.md"
      pr_number:        ${{ github.event.pull_request.number }}
      base_sha:         ${{ github.event.pull_request.base.sha }}
      head_sha:         ${{ github.event.pull_request.head.sha }}
      quality_artifact: "quality-report-TP4"
    secrets:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
